<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Chat Overlay (No API Key)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
    }

    /* Container */
    #chat-wrapper {
        width: 400px;
        height: 900px;
        position: relative;
        overflow: hidden;
        border-radius: 20px;
        backdrop-filter: blur(20px) brightness(0.7);
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.1);
    }

    /* Iframe styling */
    iframe {
        width: 100%;
        height: 100%;
        border: none;
        transform: scale(1.05);
        transform-origin: top left;
        filter: brightness(1.2) contrast(1.1) saturate(1.2);
    }

    /* Optional: fade edges */
    #mask {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.4) 100%);
    }
</style>
</head>

<body>

<div id="chat-wrapper">
    <iframe id="ytchat" src="" allowfullscreen></iframe>
    <div id="mask"></div>
</div>

<script>
/* ---------------------------------------------------------
   CONFIG
--------------------------------------------------------- */
const VIDEO_ID = "YOUR_VIDEO_ID_HERE";  
// Zet hier je livestream video ID

/* ---------------------------------------------------------
   BUILD CHAT URL
--------------------------------------------------------- */
const iframe = document.getElementById("ytchat");

iframe.src =
  "https://www.youtube.com/live_chat?v=" +
  VIDEO_ID +
  "&embed_domain=p1xelpp.github.io";
</script>

</body>
</html>
